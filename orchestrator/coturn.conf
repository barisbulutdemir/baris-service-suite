# Listening port for STUN/TURN (UDP and TCP)
listening-port=3478

# External IP of the TURN server (must be public IP)
external-ip=3.73.144.148

# TURN Username and Password (Format: username:password)
user=baris:BarisServis2026!

# Realm (should match your domain or IP)
realm=3.73.144.148

# Use long-term credential mechanism
lt-cred-mech

# Disable CLI (for security)
no-cli

# Port range for P2P data relay (UDP)
min-port=49152
max-port=65535

# Verbose logging (useful for debugging connections)
verbose
