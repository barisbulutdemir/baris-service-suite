version: '3.8'

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs -r rustdesk-hbbr.local:21117 -k _
    volumes:
      - ./rustdesk-data:/root
    network_mode: "host"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr -k _
    volumes:
      - ./rustdesk-data:/root
    network_mode: "host"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baris-orchestrator
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_TOKEN=BarisServis2026!
      # WebRTC STUN/TURN Server Configuration (Open Relay Project)
      - TURN_URL=turn:openrelay.metered.ca:3478?transport=udp
      - TURN_USERNAME=openrelayproject
      - TURN_PASSWORD=openrelayproject
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
