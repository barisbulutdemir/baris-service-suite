version: '3.8'

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs -r 3.73.144.148:21117 -k _
    volumes:
      - ./rustdesk-data:/root
    network_mode: "host"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr -k _
    volumes:
      - ./rustdesk-data:/root
    network_mode: "host"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baris-orchestrator
    ports:
      - "80:3000"
    volumes:
      - ./private:/app/private
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_TOKEN=BarisServis2026!
      # WebRTC STUN/TURN Server Configuration (Local Coturn Server)
      - TURN_URL=turn:3.73.144.148:3478
      - TURN_USERNAME=baris
      - TURN_PASSWORD=BarisServis2026!
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  coturn:
    image: coturn/coturn:latest
    container_name: baris-coturn
    network_mode: "host"
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: baris-cloudflared
    network_mode: "host"
    command: tunnel --no-autoupdate run --token eyJhIjoiOTcxNzQ1Mzc4ZmNkNzRmZmI2MTRhOTA1NDg2MGMyYzgiLCJ0IjoiNDlhMTNiYzMtNDcyZi00N2E0LWEzMzMtMzVlZDljM2NhMDlhIiwicyI6IllqZ3hNak01TnpZdE0yWm1OaTAwWWpCbUxXSXpORGN0Wm1WaVpUY3hNbVJrT0dWaiJ9
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
